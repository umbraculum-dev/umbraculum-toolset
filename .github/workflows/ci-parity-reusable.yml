name: ci-parity-reusable

on:
  workflow_call:
    inputs:
      manifest_path:
        description: Path to ci-parity manifest relative to repo root
        type: string
        default: .umbraculum/ci-parity.json
      jobs:
        description: Comma-separated job ids (empty = all jobs in manifest)
        type: string
        default: ""
      ci_parity_version:
        description: npm version range for @umbraculum/ci-parity
        type: string
        default: "1"

jobs:
  ci-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Pull CI parity runtime image (retry Docker Hub flakes)
        run: |
          set -euo pipefail
          IMAGE="$(jq -r '.runtime.image' "${{ inputs.manifest_path }}")"
          echo "Pulling ${IMAGE} (manifest runtime.image)..."
          for attempt in 1 2 3 4 5; do
            if docker pull "${IMAGE}"; then
              echo "Pulled ${IMAGE}"
              exit 0
            fi
            delay=$((attempt * 15))
            echo "docker pull failed (attempt ${attempt}/5); retrying in ${delay}s..." >&2
            sleep "${delay}"
          done
          echo "FATAL: could not pull ${IMAGE} after 5 attempts" >&2
          exit 1

      - name: Setup Node.js (orchestrator only — jobs run in Docker via ci-parity)
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run @umbraculum/ci-parity
        env:
          JOBS: ${{ inputs.jobs }}
        run: |
          set -euo pipefail
          JOB_ARGS=""
          if [ -n "$JOBS" ]; then
            JOB_ARGS="--jobs $JOBS"
          fi
          npx @umbraculum/ci-parity@${{ inputs.ci_parity_version }} run --ci \
            --manifest "${{ inputs.manifest_path }}" \
            --repo "${{ github.workspace }}" \
            $JOB_ARGS
