name: ci-parity-package

on:
  push:
    branches: [master]
    paths:
      - "packages/ci-parity/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-parity-package.yml"
  pull_request:
    branches: [master]
    paths:
      - "packages/ci-parity/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-parity-package.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run typecheck -w @umbraculum/ci-parity
      - run: npm test -w @umbraculum/ci-parity
      - run: npm run build -w @umbraculum/ci-parity
