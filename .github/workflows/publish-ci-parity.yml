name: publish-ci-parity

# Publishes @umbraculum/ci-parity to npm on ci-parity-v* tags.
# Auth: npm Trusted Publishing (OIDC) — no NPM_TOKEN.
# See umbraculum-dev docs/design/ci-parity-npm-trusted-publishing.md

on:
  push:
    tags:
      - "ci-parity-v*"

permissions:
  contents: read
  id-token: write # Required for npm OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Ensure npm CLI supports trusted publishing (>= 11.5.1)
        run: npm install -g npm@11.6.2 && npm --version

      - run: npm ci
      - run: npm run typecheck -w @umbraculum/ci-parity
      - run: npm test -w @umbraculum/ci-parity
      - run: npm run build -w @umbraculum/ci-parity

      # setup-node registry-url writes _authToken=${NODE_AUTH_TOKEN}; when unset that
      # blocks OIDC. Strip only that line — keep registry= (actions/setup-node#1551).
      - name: Strip setup-node _authToken for OIDC
        run: |
          npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          if [ -f "$npmrc" ]; then
            sed -i '/_authToken/d' "$npmrc"
          fi

      - name: Publish @umbraculum/ci-parity (OIDC)
        working-directory: packages/ci-parity
        run: |
          unset NODE_AUTH_TOKEN
          npm publish --access public
